<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Форма выбора питомца</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main>
            <h1>Найди себе друга!</h1>

            <form method="POST" action="/pets/orders">
                <div>
                    <label for="petType">Тип животного</label>
                    <select id="petType" name="petType">
                        <option value="cat" selected>Кот</option>
                        <option value="dog">Собака</option>
                        <option value="tiger">Тигр</option>
                    </select>
                </div>

                <fieldset>
                    <legend>Пол</legend>
                    <label>
                        <input type="radio" name="gender" value="boy" checked />
                        Мальчик
                    </label>
                    <label>
                        <input type="radio" name="gender" value="girl" />
                        Девочка
                    </label>
                    <label>
                        <input type="radio" name="gender" value="none" />
                        Не указан
                    </label>
                </fieldset>

                <div>
                    <label for="eyeColor">Цвет глаз</label>
                    <input
                        type="color"
                        id="eyeColor"
                        name="eyeColor"
                        value="#1a7f37"
                    />
                </div>

                <div>
                    <label for="tailLength"
                        >Длина хвоста:
                        <output id="tailLengthOutput">30</output> см</label
                    >
                    <input
                        type="range"
                        id="tailLength"
                        name="tailLength"
                        min="7"
                        max="120"
                        value="30"
                        oninput="
                            document.getElementById(
                                'tailLengthOutput',
                            ).textContent = this.value
                        "
                    />
                </div>

                <div>
                    <label for="name">Имя хозяина</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Введите ваше имя"
                        minlength="3"
                        maxlength="50"
                        value="Иван"
                    />
                </div>

                <div>
                    <label for="dateOfBirth">Дата рождения</label>
                    <input
                        type="date"
                        id="dateOfBirth"
                        name="dateOfBirth"
                        value="2000-01-15"
                    />
                </div>

                <div>
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="example@mail.com"
                        value="test@example.com"
                    />
                </div>

                <div>
                    <label for="phone">Телефон</label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="+7 (999) 123-45-67"
                        value="+79991234567"
                    />
                </div>

                <div>
                    <label>
                        <input
                            type="checkbox"
                            name="rules"
                            value="true"
                            checked
                        />
                        Я согласен с правилами
                    </label>
                </div>

                <button type="submit">Отправить заказ</button>
            </form>
        </main>
    </body>
</html>
